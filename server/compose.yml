services:
  app:
    build: .
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      DATABASE_URL: postgres://devops_demo:devops_demo@postgres:5432/devops_demo
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devops_demo
      POSTGRES_USER: devops_demo
      POSTGRES_PASSWORD: devops_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops_demo -d devops_demo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
