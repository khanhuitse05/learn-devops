name: Demo AWS OIDC Auth

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

jobs:
  aws-oidc-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Replace <ACCOUNT_ID> with your AWS Account ID
          # Replace <ROLE_NAME> with the role name created by CloudFormation
          role-to-assume: arn:aws:iam::043654935620:role/khanhuitse05-learn-devops-github-actions-role
          aws-region: us-east-1

      - name: Verify AWS Connection
        run: |
          echo "Testing AWS authentication..."
          aws sts get-caller-identity
          
          echo "Testing AWS permissions (List S3 Buckets)..."
          aws s3 ls
